"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$git_branch$git_status$nodejs$python$rust$golang
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold blue"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "red"

